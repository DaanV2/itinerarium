# Itinerarium configuration. Copy to config/config.yaml (or pass any path via
# --config). Priority: flags → env vars → this file → built-in defaults.
#
# Every key doubles as flag and env var: database.path → --database.path →
# DATABASE_PATH.

server:
  # Address the API listens on (flag: --server.address, env: SERVER_ADDRESS)
  address: ":8080"

database:
  # Database backend: sqlite (default), memory, postgres, or mysql
  # (flag: --database.type, env: DATABASE_TYPE)
  type: "sqlite"
  # SQLite database file (flag: --database.path, env: DATABASE_PATH)
  path: "data/itinerarium.db"
  # Connection string for postgres/mysql (required for those backends). For
  # sqlite it overrides path when set.
  # (flag: --database.dsn, env: DATABASE_DSN)
  # postgres example:
  #   type: "postgres"
  #   dsn: "host=localhost user=itinerarium password=secret dbname=itinerarium port=5432 sslmode=disable"
  # mysql example:
  #   type: "mysql"
  #   dsn: "itinerarium:secret@tcp(localhost:3306)/itinerarium?charset=utf8mb4&parseTime=True&loc=Local"
  # Connection-pool tuning (mostly relevant for postgres/mysql)
  # max-idle-conns: 2
  # max-open-conns: 0        # 0 = unlimited
  # conn-max-lifetime: "1h"

auth:
  # Directory holding the RS512 JWT signing key pair, auto-generated on first
  # start (flag: --auth.keys-path, env: AUTH_KEYS_PATH)
  # keys-path: "data/keys"
  # Access token lifetime (flag: --auth.token-ttl, env: AUTH_TOKEN_TTL)
  # token-ttl: "15m"

catalog:
  # Optional JSON/YAML file seeding the currency and item catalog on startup.
  # It upserts on every start, so editing the file and restarting is safe. See
  # config/catalog.example.yaml (flag: --catalog.path, env: CATALOG_PATH)
  # path: "config/catalog.example.yaml"

log:
  # Log level: debug, info, warn, error, fatal (flag: --log.level, env: LOG_LEVEL)
  # level: "info"
  # Log format: text, json, logfmt (flag: --log.format, env: LOG_FORMAT)
  # format: "text"

security:
  # Maximum accepted request body size in bytes; 0 disables the cap. Default
  # 10 MiB. Raise only if large Obsidian imports need it.
  # (flag: --security.body-limit, env: SECURITY_BODY_LIMIT)
  # body-limit: 10485760

  # Content-Security-Policy header value. Empty uses a built-in policy suited to
  # the embedded SPA (flag: --security.csp, env: SECURITY_CSP)
  # csp: ""

  # Send Strict-Transport-Security on every response. Enable when the instance
  # is served behind TLS (flag: --security.hsts, env: SECURITY_HSTS)
  # hsts: false

  # Failed login attempts (counted per client IP and per account) before an
  # exponential lockout kicks in. 0 disables the in-process limiter — leave it
  # on unless a reverse proxy already throttles /api/login.
  # (flag: --security.login-max-failures, env: SECURITY_LOGIN_MAX_FAILURES)
  # login-max-failures: 5

  # Base lockout applied once the failure threshold is hit; it doubles per
  # further failure, up to 32x this value.
  # (flag: --security.login-lockout, env: SECURITY_LOGIN_LOCKOUT)
  # login-lockout: 1m

  # Trust X-Forwarded-For for the client IP in rate limiting. Enable ONLY when a
  # reverse proxy you control sets it, otherwise a caller can spoof it to dodge
  # the per-IP limit.
  # (flag: --security.trust-proxy-headers, env: SECURITY_TRUST_PROXY_HEADERS)
  # trust-proxy-headers: false
