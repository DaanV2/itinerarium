services:
  itinerarium:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDRESS: ":8080"
      SERVER_DATABASE_PATH: "/app/data/itinerarium.db"
    volumes:
      - data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  data:
