services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDRESS: ":8080"
      SERVER_DATABASE_PATH: "/app/data/itinerarium.db"
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      # SvelteKit server-side fetches reach the API over the compose network
      API_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  api-data:
