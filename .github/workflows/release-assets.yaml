name: 🚚 Release assets

on:
  release:
    types: [released]

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    name: 🐳 Build & Push Docker Image
    permissions:
      contents: write # For updating the release
      packages: write # Required for pushing to ghcr.io
      id-token: write # OIDC token if needed

    strategy:
      matrix:
        component: [api, web]

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v7

      - name: ⚒️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Building tags
        id: repo
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🛠️ Build and Push
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}-${{ matrix.component }}:latest
            ghcr.io/${{ steps.repo.outputs.repo }}-${{ matrix.component }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.repo }}-${{ matrix.component }}:${{ github.ref_name }}

      - name: 📌 Update Release Notes with Docker Image
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          body: |
            ---
            🐳 **Docker image for this release (${{ matrix.component }}):**
            - `ghcr.io/${{ steps.repo.outputs.repo }}-${{ matrix.component }}:latest`
            - `ghcr.io/${{ steps.repo.outputs.repo }}-${{ matrix.component }}:${{ github.event.release.tag_name }}`
